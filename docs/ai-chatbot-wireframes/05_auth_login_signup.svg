<?xml version="1.0" encoding="UTF-8"?>
<svg width="1440" height="900" viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg" font-family="Inter,-apple-system,BlinkMacSystemFont,sans-serif">
<title>05 — Login and Signup</title>
<rect width="1440" height="900" fill="#FAFAFA"/>
<rect x="0" y="0" width="1440" height="900" rx="0" fill="#F0F0EF" stroke="none" stroke-width="0.5"/>
<rect x="0" y="0" width="1440" height="50" rx="0" fill="#FFFFFF" stroke="#CECBC4" stroke-width="0.5"/>
<text x="20" y="31" font-size="14" fill="#1A1A1A" font-weight="500" text-anchor="start">YourAI</text>
<line x1="720" y1="0" x2="720" y2="900" stroke="#CECBC4" stroke-width="0.5"/>
<text x="50" y="42" font-size="9" fill="#9B9994" font-weight="500" text-anchor="start">LOGIN</text>
<text x="740" y="42" font-size="9" fill="#9B9994" font-weight="500" text-anchor="start">SIGN UP</text>
<rect x="160" y="70" width="400" height="490" rx="12" fill="#FFFFFF" stroke="#CECBC4" stroke-width="0.5"/>
<text x="360" y="130" font-size="24" fill="#1A1A1A" font-weight="500" text-anchor="middle">YourAI</text>
<text x="360" y="164" font-size="18" fill="#1A1A1A" font-weight="500" text-anchor="middle">Welcome back</text>
<text x="360" y="188" font-size="12" fill="#555551" font-weight="normal" text-anchor="middle">Sign in to continue</text>
<rect x="192" y="206" width="336" height="42" rx="6" fill="#FFFFFF" stroke="#CECBC4" stroke-width="1"/>
<text x="360" y="232" font-size="13" fill="#1A1A1A" font-weight="normal" text-anchor="middle">G   Continue with Google</text>
<line x1="192" y1="266" x2="336" y2="266" stroke="#CECBC4" stroke-width="0.5"/>
<text x="360" y="272" font-size="11" fill="#9B9994" font-weight="normal" text-anchor="middle">or</text>
<line x1="384" y1="266" x2="528" y2="266" stroke="#CECBC4" stroke-width="0.5"/>
<text x="192" y="290" font-size="11" fill="#555551" font-weight="normal" text-anchor="start">Email address</text>
<rect x="192" y="300" width="336" height="38" rx="6" fill="#FFFFFF" stroke="#CECBC4" stroke-width="0.5"/>
<text x="202" y="323.0" font-size="11" fill="#9B9994" font-weight="normal" text-anchor="start">you@email.com</text>
<text x="192" y="356" font-size="11" fill="#555551" font-weight="normal" text-anchor="start">Password</text>
<text x="440" y="356" font-size="11" fill="#1967D2" font-weight="normal" text-anchor="start">Forgot password?</text>
<rect x="192" y="366" width="336" height="38" rx="6" fill="#FFFFFF" stroke="#CECBC4" stroke-width="0.5"/>
<text x="202" y="389.0" font-size="11" fill="#9B9994" font-weight="normal" text-anchor="start">••••••••</text>
<rect x="192" y="426" width="336" height="44" rx="6" fill="#1A1A1A" stroke="none" stroke-width="0.5"/>
<text x="360" y="452" font-size="13" fill="#FFFFFF" font-weight="normal" text-anchor="middle">Sign in →</text>
<text x="360" y="494" font-size="12" fill="#555551" font-weight="normal" text-anchor="middle">Don't have an account? </text>
<text x="438" y="494" font-size="12" fill="#1967D2" font-weight="normal" text-anchor="start">Sign up free</text>
<rect x="870" y="70" width="420" height="560" rx="12" fill="#FFFFFF" stroke="#CECBC4" stroke-width="0.5"/>
<text x="1080" y="130" font-size="24" fill="#1A1A1A" font-weight="500" text-anchor="middle">YourAI</text>
<text x="1080" y="164" font-size="18" fill="#1A1A1A" font-weight="500" text-anchor="middle">Create your account</text>
<text x="1080" y="188" font-size="12" fill="#555551" font-weight="normal" text-anchor="middle">Free forever. No credit card required.</text>
<rect x="902" y="204" width="356" height="42" rx="6" fill="#FFFFFF" stroke="#CECBC4" stroke-width="1"/>
<text x="1080" y="230" font-size="13" fill="#1A1A1A" font-weight="normal" text-anchor="middle">G   Sign up with Google</text>
<line x1="902" y1="264" x2="1056" y2="264" stroke="#CECBC4" stroke-width="0.5"/>
<text x="1080" y="270" font-size="11" fill="#9B9994" font-weight="normal" text-anchor="middle">or</text>
<line x1="1104" y1="264" x2="1258" y2="264" stroke="#CECBC4" stroke-width="0.5"/>
<text x="902" y="282" font-size="11" fill="#555551" font-weight="normal" text-anchor="start">Full name</text>
<rect x="902" y="292" width="356" height="36" rx="6" fill="#FFFFFF" stroke="#CECBC4" stroke-width="0.5"/>
<text x="912" y="314.0" font-size="11" fill="#9B9994" font-weight="normal" text-anchor="start">Enter your name</text>
<text x="902" y="348" font-size="11" fill="#555551" font-weight="normal" text-anchor="start">Email address</text>
<rect x="902" y="358" width="356" height="36" rx="6" fill="#FFFFFF" stroke="#CECBC4" stroke-width="0.5"/>
<text x="912" y="380.0" font-size="11" fill="#9B9994" font-weight="normal" text-anchor="start">you@email.com</text>
<text x="902" y="414" font-size="11" fill="#555551" font-weight="normal" text-anchor="start">Password</text>
<rect x="902" y="424" width="356" height="36" rx="6" fill="#FFFFFF" stroke="#CECBC4" stroke-width="0.5"/>
<text x="912" y="446.0" font-size="11" fill="#9B9994" font-weight="normal" text-anchor="start">Min 8 characters</text>
<rect x="902" y="494" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#CECBC4" stroke-width="1"/>
<text x="926" y="506" font-size="11" fill="#555551" font-weight="normal" text-anchor="start">I agree to Terms of Service and Privacy Policy</text>
<rect x="902" y="520" width="356" height="44" rx="6" fill="#1A1A1A" stroke="none" stroke-width="0.5"/>
<text x="1080" y="546" font-size="13" fill="#FFFFFF" font-weight="normal" text-anchor="middle">Create account →</text>
<text x="1080" y="590" font-size="12" fill="#555551" font-weight="normal" text-anchor="middle">Already have an account? </text>
<text x="1160" y="590" font-size="12" fill="#1967D2" font-weight="normal" text-anchor="start">Sign in</text>
</svg>