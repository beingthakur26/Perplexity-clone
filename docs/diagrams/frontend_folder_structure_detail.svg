<svg width="1600" height="1200" viewBox="0 0 1600 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg{fill:#0F1117}
      .done{fill:#123B38;stroke:#20B2AA;stroke-width:2}
      .todo{fill:#211A1A;stroke:#7A3B3B;stroke-width:2}
      .box{fill:#161A22;stroke:#2B3241;stroke-width:2}
      .later{fill:#1A1D27;stroke:#465063;stroke-width:2;stroke-dasharray:8 6}
      .text{fill:#F3F5F7;font-family:Inter,Segoe UI,Arial,sans-serif}
      .muted{fill:#A7ADB8;font-family:Inter,Segoe UI,Arial,sans-serif}
      .green{fill:#20B2AA;font-family:Inter,Segoe UI,Arial,sans-serif}
      .red{fill:#F87171;font-family:Inter,Segoe UI,Arial,sans-serif}
      .title{font-size:38px;font-weight:800}
      .h{font-size:22px;font-weight:800}
      .s{font-size:16px}
      .xs{font-size:14px}
      .line{stroke:#465063;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .accent{stroke:#20B2AA;stroke-width:3;fill:none;marker-end:url(#arrowA)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#465063"/></marker>
    <marker id="arrowA" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#20B2AA"/></marker>
  </defs>
  <rect class="bg" width="1600" height="1200"/>
  <text class="text title" x="60" y="70">Frontend Folder Structure - Detailed Working Map</text>
  <text class="muted s" x="60" y="105">Green = implemented/started. Red = created but mostly empty or missing. Dashed = advanced later.</text>

  <rect class="done" x="60" y="145" width="300" height="150" rx="14"/>
  <text class="text h" x="90" y="185">main.jsx</text>
  <text class="muted xs" x="90" y="220">React entry point</text>
  <text class="muted xs" x="90" y="245">mounts App</text>
  <text class="muted xs" x="90" y="270">wraps providers if needed</text>

  <rect class="done" x="430" y="145" width="300" height="150" rx="14"/>
  <text class="text h" x="460" y="185">app/</text>
  <text class="green xs" x="460" y="220">App.jsx exists</text>
  <text class="green xs" x="460" y="245">app.routes.jsx exists</text>
  <text class="green xs" x="460" y="270">store + CSS exist</text>

  <rect class="todo" x="800" y="145" width="300" height="150" rx="14"/>
  <text class="text h" x="830" y="185">components/layout/</text>
  <text class="red xs" x="830" y="220">AppLayout.jsx empty</text>
  <text class="red xs" x="830" y="245">Sidebar/Topbar empty</text>
  <text class="muted xs" x="830" y="270">Purpose: app shell</text>

