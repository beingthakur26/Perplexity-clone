<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg{fill:#0F1117}
      .panel{fill:#161A22;stroke:#2B3241;stroke-width:2}
      .panel2{fill:#1A1D27;stroke:#2B3241;stroke-width:2}
      .text{fill:#F3F5F7;font-family:Inter,Segoe UI,Arial,sans-serif}
      .muted{fill:#A7ADB8;font-family:Inter,Segoe UI,Arial,sans-serif}
      .title{font-size:36px;font-weight:800}
      .med{font-size:22px;font-weight:700}
      .small{font-size:18px}
      .tiny{font-size:15px}
      .line{stroke:#465063;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
      .accent{stroke:#20B2AA;stroke-width:3;fill:none;marker-end:url(#arrowAccent)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#465063"/>
    </marker>
    <marker id="arrowAccent" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#20B2AA"/>
    </marker>
  </defs>

  <rect class="bg" width="1400" height="900"/>
  <text class="text title" x="60" y="70">Frontend Architecture</text>
  <text class="muted small" x="60" y="104">React/Vite app structure, pages, shared layout, and feature components</text>

  <rect class="panel" x="60" y="150" width="250" height="135" rx="14"/>
  <text class="text med" x="90" y="192">main.jsx</text>
  <text class="muted tiny" x="90" y="225">mounts React app</text>
  <text class="muted tiny" x="90" y="249">loads Provider/router</text>

  <rect class="panel" x="395" y="150" width="250" height="135" rx="14"/>
  <text class="text med" x="425" y="192">app/</text>
  <text class="muted tiny" x="425" y="225">App.jsx</text>
  <text class="muted tiny" x="425" y="249">routes + store + CSS</text>

  <rect class="panel" x="735" y="150" width="250" height="135" rx="14"/>
  <text class="text med" x="765" y="192">AppLayout</text>
  <text class="muted tiny" x="765" y="225">Sidebar</text>
  <text class="muted tiny" x="765" y="249">Topbar + page area</text>

  <rect class="panel" x="1090" y="150" width="250" height="135" rx="14"/>
  <text class="text med" x="1120" y="192">Pages</text>
  <text class="muted tiny" x="1120" y="225">Home, ChatThread</text>
  <text class="muted tiny" x="1120" y="249">Library, Settings</text>

  <path class="accent" d="M310 218 H395"/>
  <path class="accent" d="M645 218 H735"/>
  <path class="accent" d="M985 218 H1090"/>

  <rect class="panel2" x="60" y="365" width="300" height="360" rx="16"/>
  <text class="text med" x="90" y="410">Shared UI</text>
  <text class="muted small" x="90" y="455">Button.jsx</text>
  <text class="muted small" x="90" y="490">Input.jsx</text>
  <text class="muted small" x="90" y="525">Modal.jsx</text>
  <text class="muted small" x="90" y="560">Tabs.jsx</text>
  <text class="muted small" x="90" y="595">Dropdown.jsx</text>
  <text class="muted small" x="90" y="630">Skeleton.jsx</text>
  <text class="muted small" x="90" y="665">Tooltip.jsx</text>

  <rect class="panel2" x="400" y="365" width="300" height="360" rx="16"/>
  <text class="text med" x="430" y="410">Chat Feature</text>
  <text class="muted small" x="430" y="455">Home.jsx</text>
  <text class="muted small" x="430" y="490">ChatThread.jsx</text>
  <text class="muted small" x="430" y="525">ChatInput.jsx</text>
  <text class="muted small" x="430" y="560">StreamingAnswer.jsx</text>
  <text class="muted small" x="430" y="595">CitationBadge.jsx</text>
  <text class="muted small" x="430" y="630">SourcePanel.jsx</text>
  <text class="muted small" x="430" y="665">useChat.js</text>

  <rect class="panel2" x="740" y="365" width="300" height="360" rx="16"/>
  <text class="text med" x="770" y="410">App Features</text>
  <text class="muted small" x="770" y="455">auth/</text>
  <text class="muted small" x="770" y="490">library/</text>
  <text class="muted small" x="770" y="525">settings/</text>
  <text class="muted small" x="770" y="560">billing/ later</text>
  <text class="muted small" x="770" y="595">files/ later</text>
  <text class="muted small" x="770" y="630">spaces/ later</text>
  <text class="muted small" x="770" y="665">share/ later</text>

  <rect class="panel2" x="1080" y="365" width="260" height="360" rx="16"/>
  <text class="text med" x="1110" y="410">API + Helpers</text>
  <text class="muted small" x="1110" y="455">lib/axios.js</text>
  <text class="muted small" x="1110" y="490">chat.api.js</text>
  <text class="muted small" x="1110" y="525">citationParser.js</text>
  <text class="muted small" x="1110" y="560">streamParser.js</text>
  <text class="muted small" x="1110" y="595">markdown.js</text>
  <text class="muted small" x="1110" y="630">constants.js</text>
  <text class="muted small" x="1110" y="665">formatDate.js</text>

  <path class="line" d="M735 535 H700"/>
  <path class="line" d="M740 535 H700"/>
  <path class="line" d="M1040 535 H1080"/>
  <path class="line" d="M400 535 H360"/>

  <rect class="panel" x="60" y="775" width="1280" height="70" rx="14"/>
  <text class="text small" x="90" y="818">Frontend success line: Home -> ChatInput -> useChat -> API -> ChatThread -> StreamingAnswer + SourcePanel</text>
</svg>
